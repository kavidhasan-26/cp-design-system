<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CP Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #storybook-root {
        margin: 0;
        padding: 0;
      }

      /*
       * Docs render inside #storybook-root (.sbdocs is a child, not a parent).
       * Never force viewport height on the root for docs pages.
       */
      #storybook-root:has(.sbdocs),
      .sb-show-main:has(#storybook-root .sbdocs) {
        min-height: auto !important;
        height: auto !important;
      }

      #storybook-root:has(.sbdocs) {
        display: block;
      }

      /* Centered layout vertically centers the whole docs page — keep docs top-aligned */
      .sb-show-main.sb-main-centered {
        align-items: flex-start !important;
        min-height: auto !important;
      }

      .sb-show-main.sb-main-centered #storybook-root {
        margin: 0 !important;
        max-height: none !important;
        width: 100%;
      }

      /* Keep inline story embeds in docs compact */
      .sbdocs .docs-story,
      .sbdocs .docs-story > div,
      .sbdocs .innerZoomElementWrapper,
      .sbdocs .innerZoomElementWrapper > div {
        min-height: unset !important;
        height: auto !important;
      }

      .sbdocs .sbdocs-content {
        padding-top: 16px;
      }

      /* Remove browser focus ring from RN TextInput on web — field border handles focus. */
      #storybook-root input:focus,
      #storybook-root textarea:focus {
        box-shadow: none !important;
        outline: none !important;
      }
    </style>
  </head>
  <body>
    <div id="storybook-root"></div>
  </body>
</html>
