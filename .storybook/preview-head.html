<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CP Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #storybook-root {
        margin: 0;
        padding: 0;
      }

      /*
       * Docs render inside #storybook-root (.sbdocs is a child, not a parent).
       * Never force viewport height on the root for docs pages.
       */
      #storybook-root:has(.sbdocs),
      .sb-show-main:has(#storybook-root .sbdocs) {
        min-height: auto !important;
        height: auto !important;
      }

      #storybook-root:has(.sbdocs) {
        display: block;
      }

      /* Centered layout vertically centers the whole docs page — keep docs top-aligned */
      .sb-show-main.sb-main-centered {
        align-items: flex-start !important;
        min-height: auto !important;
      }

      .sb-show-main.sb-main-centered #storybook-root {
        margin: 0 !important;
        max-height: none !important;
        width: 100%;
      }

      /* Keep inline story embeds in docs compact */
      .sbdocs .docs-story,
      .sbdocs .docs-story > div,
      .sbdocs .innerZoomElementWrapper,
      .sbdocs .innerZoomElementWrapper > div {
        min-height: unset !important;
        height: auto !important;
      }

      .sbdocs .sbdocs-content {
        padding-top: 16px;
      }

      /* Remove browser focus ring from RN TextInput on web — field border handles focus. */
      #storybook-root input:focus,
      #storybook-root textarea:focus {
        box-shadow: none !important;
        outline: none !important;
      }

      /* Shared doc layout — Introduction + component Docs tab. */
      .cp-doc-page-sections {
        display: flex;
        flex-direction: column;
        gap: 48px;
        width: 100%;
      }

      .sbdocs .cp-doc-page-sections {
        margin-top: 48px;
      }

      .cp-doc-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .cp-doc-section-body {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .cp-doc-block-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }

      .cp-doc-section-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .cp-doc-section-title {
        color: #171717;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        font-weight: 600;
        line-height: 20px;
        margin: 0;
      }

      .cp-doc-section-description {
        color: #666666;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        margin: 0;
      }

      .cp-code-block {
        background: #f5f5f5;
        border: 1px solid #ebebeb;
        border-radius: 12px;
        box-sizing: border-box;
        min-height: 52px;
        overflow: hidden;
        position: relative;
        width: 100%;
      }

      pre.cp-code-block-text,
      .sbdocs pre.cp-code-block-text {
        background: transparent !important;
        border: none !important;
        box-sizing: border-box;
        color: #171717 !important;
        display: block;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        font-size: 13px !important;
        font-weight: 400 !important;
        line-height: 20px !important;
        margin: 0 !important;
        padding: 16px 72px 16px 16px !important;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .cp-code-block-copy,
      .sbdocs .cp-code-block-copy {
        appearance: none;
        background: #ffffff !important;
        border: 1px solid #ebebeb !important;
        border-radius: 8px;
        box-sizing: border-box;
        color: #666666 !important;
        cursor: pointer;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        font-size: 12px !important;
        font-weight: 500 !important;
        line-height: 16px !important;
        margin: 0;
        min-height: 28px;
        padding: 6px 10px;
        position: absolute;
        right: 12px;
        top: 12px;
      }

      .cp-code-block-copy:hover {
        opacity: 0.8;
      }

      .cp-code-block-copy:focus-visible {
        outline: 2px solid #514c9f;
        outline-offset: 2px;
      }

      /*
       * Stories section — one section title (cp-doc-section-title); hide Storybook's
       * default uppercase "STORIES" heading and align story name + description hierarchy.
       */
      .cp-stories-list {
        display: flex;
        flex-direction: column;
        gap: 32px;
        width: 100%;
      }

      .cp-stories-list .sb-anchor {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      .cp-stories-list .sb-anchor > h3,
      .sbdocs .cp-stories-list .sb-anchor > h3 {
        border: 0 !important;
        color: #171717 !important;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        font-size: 14px !important;
        font-weight: 600 !important;
        letter-spacing: normal !important;
        line-height: 20px !important;
        margin: 0 !important;
        text-transform: none !important;
      }

      .cp-stories-list .sb-anchor > p,
      .sbdocs .cp-stories-list .sb-anchor > p {
        color: #666666 !important;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        font-size: 14px !important;
        font-weight: 400 !important;
        line-height: 20px !important;
        margin: 8px 0 0 !important;
      }

      .cp-stories-list .sb-anchor > :not(h3):not(p) {
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div id="storybook-root"></div>
  </body>
</html>
